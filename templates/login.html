<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .box {
      width: 380px;
      margin: 80px auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 30px;
      box-sizing: border-box;
    }
    h1 {
      margin-top: 0;
      font-size: 22px;
      text-align: center;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .error {
      background: #ffe3e3;
      color: #b00020;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .hint {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Login</h1>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <div class="hint">
      Bitte melden Sie sich mit Ihrem Benutzernamen und Passwort an.
    </div>

    <form method="POST" action="/login">
      <label for="username">Benutzername</label>
      <input type="text" id="username" name="username" required>

      <label for="password">Passwort</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">Einloggen</button>
    </form>
  </div>
</body>
</html>
